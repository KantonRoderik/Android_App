name: Android CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest

    - name: Run Instrumented Tests
      uses: reactivecircus/android-emulator-runner@v2
      with:
        api-level: 29
        script: ./gradlew connectedDebugAndroidTest

    - name: Generate Jacoco Report
      run: ./gradlew jacocoTestReport

    - name: Check Coverage
      run: |
        # Simple bash script to check if XML exists and maybe grep for percentage
        # In a real scenario, you'd use a Jacoco plugin or specialized action
        if [ -f "app/build/reports/jacoco/jacocoTestReport/jacocoTestReport.xml" ]; then
          echo "Jacoco report found."
        else
          echo "Jacoco report missing!"
          # exit 1 # Uncomment to fail if coverage report is missing
        fi
